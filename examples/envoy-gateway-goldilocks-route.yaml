apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: goldilocks-dashboard
  namespace: goldilocks
spec:
  parentRefs:
    - name: public
  hostnames:
    - goldilocks.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: goldilocks-dashboard
          port: 80
